name: Build and deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test_flake8:
  name: Run flake8
  runs-on: ubuntu-latest

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run backend flake8
      run: |
        flake8 backend

    - name: Run bot flake8
      run: |
        flake8 bot

  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: test_flake8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vpn-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vpn-backend:${{ github.sha }}

      - name: Build and push bot image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./bot
          file: ./bot/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vpn-bot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vpn-bot:${{ github.sha }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/vpn-bot
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Notify Telegram success
        if: success()
        run: |
          MESSAGE="✅ VPN bot deployed successfully
          Repo: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Actor: ${{ github.actor }}"

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.DEPLOY_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.DEPLOY_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}"

      - name: Notify Telegram failure
        if: failure()
        run: |
          MESSAGE="❌ VPN bot deploy failed
          Repo: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Actor: ${{ github.actor }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.DEPLOY_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.DEPLOY_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}"
