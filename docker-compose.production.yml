services:
  backend:
    image: ${DOCKERHUB_USERNAME}/vpn-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  bot:
    image: ${DOCKERHUB_USERNAME}/vpn-bot:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
