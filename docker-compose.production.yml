services:
  backend:
    image: ${DOCKERHUB_USERNAME}/vpn-backend:latest
    container_name: vpn_bot_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  bot:
    image: ${DOCKERHUB_USERNAME}/vpn-bot:latest
    container_name: vpn_bot_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: vpn_bot_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: