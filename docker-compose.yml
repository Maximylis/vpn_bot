services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpn_bot_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
          condition: service_healthy
      vpn-manager:
          condition: service_started
    networks:
      - vpn_bot_network

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: vpn_bot_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - vpn_bot_network

  postgres:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_bot_user -d vpn_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    container_name: vpn_bot_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vpn_bot_network

  vpn-manager:
    build:
      context: ./vpn-manager
      dockerfile: Dockerfile
    container_name: vpn_manager
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9000:9000"
    volumes:
      - vpn_manager_state:/var/lib/vpn-manager
    networks:
      - vpn_bot_network
    # network_mode: host
    # cap_add:
    #   - NET_ADMIN
    #   - SYS_MODULE
    # devices:
    #   - /dev/net/tun:/dev/net/tun
    # volumes:
    #   - /lib/modules:/lib/modules:ro
    #   - vpn_manager_state:/var/lib/vpn-manager

volumes:
  postgres_data:
  vpn_manager_state:

networks:
  vpn_bot_network:
    driver: bridge
